<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Dashboard - Digital Detox</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .risk-Low { color: #27ae60; font-weight: bold; }
        .risk-Medium { color: #f39c12; font-weight: bold; }
        .risk-High { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Your Progress Dashboard</h1>
        <a href="/">← Back to Analyzer</a>
        
        <div class="grid">
            <div class="card">
                <h2>Addiction Score Trend</h2>
                <div style="height: 300px;"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="card">
                <h2>Latest App Usage</h2>
                <div style="height: 300px;"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2>Recent History</h2>
            <table>
                <thead>
                    <tr><th>Date</th><th>Score</th><th>Risk</th><th>Total (h)</th><th>Sleep (h)</th></tr>
                </thead>
                <tbody>
                    {% for r in records %}
                    <tr>
                        <td>{{ r.timestamp.strftime('%b %d, %H:%M') }}</td>
                        <td>{{ r.score }}</td>
                        <td class="risk-{{ r.risk }}">{{ r.risk }}</td>
                        <td>{{ r.screen_time }}</td>
                        <td>{{ r.sleep }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Trend Chart
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: {{ dates|tojson }},
                datasets: [{ label: 'Score', data: {{ scores|tojson }}, borderColor: '#3498db', fill: true }]
            },
            options: { maintainAspectRatio: false }
        });

        // Pie Chart
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: {{ app_data.keys()|list|tojson }},
                datasets: [{
                    data: {{ app_data.values()|list|tojson }},
                    backgroundColor: ['#e74c3c', '#2c3e50', '#f1c40f', '#2980b9', '#27ae60']
                }]
            },
            options: { maintainAspectRatio: false }
        });
    </script>
</body>
</html>
